name:   React Vite CI
on:
    push:
        branches:   ["main"]
    pull_request:
        branches:   ["main"]


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
            node-version: 25.2.1
      - name: install dependencies
        run: npm install
      - name: Run test
        run: npm test

      - name: login to Docker hub
        run: echo "{{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pokedesk-frontend .

      - name: push docker image
        run: docker psuh ${{ secrets.DOCKER_USERNAME }}/pokedesk-frontend

          
          