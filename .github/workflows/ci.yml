name:   React Vite CI
on:
    push:
        branches:   ["main"]
    pull_request:
        branches:   ["main"]


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
            node-version: 25.2.1
      - name: install dependencies
        run: npm install
      - name: Run test
        run: npm test

          
          